name: Deploy Trigger.dev

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/workers/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/workers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
        working-directory: .
      - name: Deploy to Trigger.dev
        run: |
          SDK_VERSION=$(node -e "console.log(require('./package.json').dependencies['@trigger.dev/sdk'].replace('^',''))")
          npx trigger.dev@${SDK_VERSION} deploy
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
